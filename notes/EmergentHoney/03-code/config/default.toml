[general]
db_path = "data/ctf-router.db"

[api]
# adapter = "mock_adapter"
# Official competition mode:
adapter = "official_adapter"
base_url = "http://149.104.31.225:8888/"
token = "<AGENT_TOKEN>"
#
# Notes:
# - The official adapter normalizes base_url to end with /api
# - Authentication header is Agent-Token, not Authorization
# - Global platform rate limit is enforced client-side at 3 req/s
# Legacy alias:
# adapter = "http_json_adapter"

[dispatch]
max_concurrency = 8
activation_interval_sec = 5
health_interval_sec = 30

[policy]
per_zone_working_set_size = 3
# priority_mode: easy_first (高分低难度优先,忽略赛区), points_desc (高分优先), id_asc, title_asc
priority_mode = "easy_first"
auto_unlock_next = true
default_unlock_solved_count = 1
# default_unlock_score = 300
agent_log_tail_lines = 120

[monitor]
cpu_threshold = 80.0
mem_min_mb = 1024

[dashboard]
host = "0.0.0.0"
port = 8081
